
services:
  step_api:
    build: ./api
    container_name: step_api
    ports:
      - "8000:8000"
    networks:
      - container_net

  devcontainer:
    build:
      context: ./
      dockerfile: .devcontainer/Dockerfile
    container_name: devcontainer
    volumes:
      - .:/clear-shape  # mount repository into dev container (nneeded to synch with local folder)


      # Daniel
      # model checkpoint for vecset_encoder - needed for preprocessing
      #- D:\3 Resources\Nextcloud FH Kiel\Ressourcen-KI-Gruppe\Modelle\VecsetEncoder\points_vec1024x32_dim1024_depth24_sdf_nb:/clear-shape/src/clearshape/vecsets/preprocessing/vecset_model/ckpts/

      # data-folders for fabwave dataset
      #- D:\3 Resources\Nextcloud FH Kiel\Ressourcen-KI-Gruppe\Datensätze\fabwave\1_raw:/clear-shape/data/1_raw/
      #- D:\3 Resources\Nextcloud FH Kiel\Ressourcen-KI-Gruppe\Datensätze\fabwave\3_primary:/clear-shape/data/3_primary/
      #- D:\3 Resources\Nextcloud FH Kiel\Ressourcen-KI-Gruppe\Datensätze\fabwave\4_feature:/clear-shape/data/4_feature/

      # Michel
      # model checkpoint for vecset_encoder - needed for preprocessing
      #- /home/michelkruse/Nextcloud/Ressourcen-KI-Gruppe/Modelle/vecset_encoder/points_vec1024x32_dim1024_depth24_sdf_nb/checkpoint-110.pth:/clear-shape/src/clearshape/vecsets/preprocessing/vecset_model/ckpts/checkpoint-110.pth 
      # data-folders for fabwave dataset
      #- /home/michelkruse/Nextcloud/Ressourcen-KI-Gruppe/Datensätze/fabwave/1_raw:/clear-shape/data/1_raw/
      #- /home/michelkruse/Nextcloud/Ressourcen-KI-Gruppe/Datensätze/fabwave/3_primary:/clear-shape/data/3_primary/
      #- /home/michelkruse/Nextcloud/Ressourcen-KI-Gruppe/Datensätze/fabwave/4_feature:/clear-shape/data/4_feature/

    networks:
      - container_net
    depends_on:
      - step_api
    tty: true
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  container_net:
    driver: bridge
