---
n_trials: 20 # number of trials per stage
n_jobs: 1  # number of parallel jobs
stages: [train, validation, test]  # list of stages to run if possibel. (valid: train, validation, test)
n_epochs: 60
input_size: 32
classes_total: 42
output_shape: 4
loss_function: mean_squared_error
test_metric: mean_squared_error
file_best_parameter: tree-lstm-regressor-best-parameter.yaml
# ------------------------------------

# Hyperparameters to optimize on training data
# Focus on model architecture

train:

  # fixed hyperparameters for training stage
  batch_size: 512  # preferably high for faster training
  learning_rate: 0.04
  optimizer: adam
  
  # hyperparameters to tune during training stage

  encoder:
    encoding_size_min: 100
    encoding_size_max: 400
    encoding_size_step: 50

  predictor:
    layers_total_min: 3
    layers_total_max: 10
    units_per_layer_min: 32
    units_per_layer_max: 512
# ------------------------------------

# Hyperparameters to optimize on validation data
# Focus on generalization and regularization
validation:

  # fixed hyperparameters for validation stage
  batch_size: 512  # preferably high for faster training
  optimizer: adam

  # hyperparameters to tune during validation stage
  learning_rate_min: 0.0001
  learning_rate_max: 0.1

  encoder:
    dropout_rate_min: 0.0
    dropout_rate_max: 0.9
# ------------------------------------

# Hyperparameters to optimize on test data
# Focus on final performance and robustness
test:

  # fixed hyperparameters for test stage
  optimizer: adam

  # hyperparameters to tune during test stage
  batch_size_min: 64
  batch_size_max: 256
  batch_size_step: 64


