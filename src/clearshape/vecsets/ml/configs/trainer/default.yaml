_target_: pytorch_lightning.Trainer

max_epochs: 250
accelerator: auto
default_root_dir: ./../outputs/clearshape_classification/${hydra:sweep.subdir}
gradient_clip_val: 1.0

callbacks:
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: "val_loss"  # Metrik, die überwacht werden soll
    patience: 10  # Anzahl der Epochen, in denen sich die Metrik nicht verbessern darf
    mode: "min" 
    min_delta: 0.00001  # Minimaler Unterschied, um als Verbesserung zu gelten

  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: null # directory to save the model file
    filename: "{epoch:02d}-{val_loss:.4f}" # checkpoint filename
    monitor: val_loss # name of the logged metric which determines when model is improving
    verbose: False # verbosity mode
    save_last: false # additionally always save an exact copy of the last checkpoint to a file last.ckpt
    save_top_k: 3 # save k best models (determined by above metric)
    mode: "min" # "max" means higher metric value is better, can be also "min"
    auto_insert_metric_name: True # when True, the checkpoints filenames will contain the metric name
    save_weights_only: False # if True, then only the model’s weights will be saved
    every_n_train_steps: null # number of training steps between checkpoints
    train_time_interval: null # checkpoints are monitored at the specified time interval
    every_n_epochs: null # number of epochs between checkpoints
    save_on_train_epoch_end: null # whether to run checkpointing at the end of the training epoch or the end of validation